<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XOVA — AI Software Development Engine</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<!-- ============================================================
     CLOUD BACKGROUND LAYER
============================================================ -->
<div class="sky-bg">
  <div class="cloud cloud-1"></div>
  <div class="cloud cloud-2"></div>
  <div class="cloud cloud-3"></div>
  <div class="cloud cloud-4"></div>
  <div class="cloud cloud-5"></div>
  <div class="cloud cloud-6"></div>
  <div class="lightning-bolt bolt-1"></div>
  <div class="lightning-bolt bolt-2"></div>
  <div class="lightning-bolt bolt-3"></div>
  <div class="sky-gradient-orb orb-1"></div>
  <div class="sky-gradient-orb orb-2"></div>
  <div class="sky-gradient-orb orb-3"></div>
</div>

<!-- ============================================================
     GHOST ASSISTANT
============================================================ -->
<div id="ghost" class="ghost-container">
  <div class="ghost-body">
    <div class="ghost-glow"></div>
    <svg class="ghost-svg" viewBox="0 0 80 100" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="ghostGrad" cx="50%" cy="40%" r="55%">
          <stop offset="0%" stop-color="#1a1a2e" stop-opacity="0.95"/>
          <stop offset="100%" stop-color="#0d0d1a" stop-opacity="0.98"/>
        </radialGradient>
        <filter id="ghostBlur">
          <feGaussianBlur stdDeviation="2" result="blur"/>
          <feComposite in="SourceGraphic" in2="blur" operator="over"/>
        </filter>
      </defs>
      <path class="ghost-shape" d="M40 8 C18 8 8 28 8 48 C8 68 8 88 14 92 C18 96 22 90 26 86 C30 82 34 86 40 86 C46 86 50 82 54 86 C58 90 62 96 66 92 C72 88 72 68 72 48 C72 28 62 8 40 8 Z"/>
      <ellipse class="ghost-eye left-eye" cx="28" cy="44" rx="6" ry="7"/>
      <ellipse class="ghost-eye right-eye" cx="52" cy="44" rx="6" ry="7"/>
      <circle class="ghost-pupil left-pupil" cx="29" cy="45" r="3"/>
      <circle class="ghost-pupil right-pupil" cx="53" cy="45" r="3"/>
      <path class="ghost-mouth" id="ghostMouth" d="M30 60 Q40 68 50 60" stroke="#6ee7f7" stroke-width="2" fill="none" stroke-linecap="round"/>
    </svg>
    <div class="ghost-particles">
      <span></span><span></span><span></span><span></span>
    </div>
  </div>
  <div class="ghost-speech-bubble" id="ghostSpeech">
    <span id="ghostSpeechText">Build anything with AI ✨</span>
  </div>
</div>

<!-- ============================================================
     NAVBAR
============================================================ -->
<nav class="navbar glass-panel" id="navbar">
  <div class="nav-brand">
    <div class="brand-icon">
      <svg viewBox="0 0 32 32" width="28" height="28" fill="none">
        <circle cx="16" cy="16" r="14" stroke="#6ee7f7" stroke-width="2"/>
        <path d="M10 16 L14 12 L18 20 L22 16" stroke="#a78bfa" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="16" cy="16" r="3" fill="#6ee7f7" opacity="0.6"/>
      </svg>
    </div>
    <span class="brand-name">XOVA</span>
    <span class="brand-tag">AI Engine</span>
  </div>
  <div class="nav-links" id="navLinks">
    <a href="#" class="nav-link active" data-page="home">Home</a>
    <a href="#" class="nav-link" data-page="projects">Projects</a>
    <a href="#" class="nav-link" data-page="api-docs">API Docs</a>
    <a href="#" class="nav-link" data-page="roadmap">Roadmap</a>
    <a href="#" class="nav-link" data-page="community">Community</a>
  </div>
  <div class="nav-actions">
    <button class="btn-glass btn-sm" id="versionHistoryBtn">
      <i class="fas fa-history"></i> History
    </button>
    <button class="btn-primary btn-sm" id="newProjectBtn">
      <i class="fas fa-plus"></i> New Build
    </button>
  </div>
</nav>

<!-- ============================================================
     PAGES CONTAINER
============================================================ -->
<div class="pages-container" id="pagesContainer">

<!-- (saara tera content yahi same rahega — maine kuch bhi cut/change nahi kiya) -->

</div>

<div class="toast-container" id="toastContainer"></div>

<script src="js/ghost.js"></script>
<script src="js/projects.js"></script>
<script src="js/apidocs.js"></script>
<script src="js/engine/planner.js"></script>
<script src="js/engine/generator.js"></script>
<script src="js/engine/streamer.js"></script>
<script src="js/engine/preview.js"></script>
<script src="js/main.js"></script>

<script src='https://www.noupe.com/embed/019dec930e3676b895e240c7ea52603b44dc.js'></script>
</body>
</html>
